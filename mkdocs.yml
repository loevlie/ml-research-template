site_name: My Project
site_description: Documentation for My ML Research Project
repo_url: https://github.com/username/my-project

theme:
  name: material
  palette:
    primary: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - search.highlight

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true

nav:
  - Home: index.md
  - API Reference:
    - Models: api/models.md
    - Data: api/data.md
    - Utils: api/utils.md
  - Rules: rules.md

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - admonition
  - tables
