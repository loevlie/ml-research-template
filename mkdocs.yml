site_name: ml-research-template
site_description: >-
  A Copier template for ML research projects — PyTorch or JAX, typed configs
  (pydantic + tyro), uv — with multi-seed significance testing and copier
  update baked in.
site_url: https://loevlie.github.io/ml-research-template/
repo_url: https://github.com/loevlie/ml-research-template
repo_name: loevlie/ml-research-template
edit_uri: edit/main/docs/

theme:
  name: material
  favicon: assets/favicon.png
  icon:
    repo: fontawesome/brands/github
    logo: material/flask-outline
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - termynal
  - social:
      enabled: !ENV [CI, false]

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/loevlie/ml-research-template

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Tutorial: tutorial.md
  - Cheatsheet: cheatsheet.md
  - The stack (and why): stack.md
  - Workflows:
      - Train & experiment: workflows/training.md
      - Typed configs & overrides: workflows/configs.md
      - Sweeps & HP search: workflows/sweeps.md
      - SLURM, checkpoints & resume: workflows/slurm.md
      - Multi-seed statistics: workflows/multi-seed-stats.md
      - Statistics, explained: workflows/stats-explained.md
      - Experiment tracking: workflows/tracking.md
      - Tabular benchmarking: workflows/tabular-benchmarking.md
      - Multimodal: workflows/multimodal.md
      - JAX: workflows/jax.md
  - Updating projects: updating.md
