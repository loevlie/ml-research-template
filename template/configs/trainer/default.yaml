accelerator: auto
devices: auto
precision: 32-true
max_epochs: 100
patience: 10

# Optimizer steps once every N batches (loss is scaled by 1/N).
accumulate_grad_batches: 1

# Clip gradients to this max norm before each optimizer step. null disables.
gradient_clip_val: 1.0

# null = fresh run | auto = pick up <run_dir>/last.ckpt if present | /path/to/last.ckpt
resume: null

# Per-step LR schedule (see utils/schedulers.py). name: none keeps constant LR.
scheduler:
  name: none          # none | cosine | constant
  warmup_steps: 0
  min_lr_ratio: 0.0   # cosine floor, as fraction of base LR
