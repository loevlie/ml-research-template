_min_copier_version: "9.4.0"
_subdirectory: template
_answers_file: .copier-answers.yml

_message_after_copy: |
  Project "{{ project_name }}" generated at {{ _copier_conf.dst_path }}

  Next steps:
    cd {{ _copier_conf.dst_path }}
    uv sync --extra dev
    uv run pre-commit install
    uv run python src/{{ package_name }}/train.py

_message_after_update: |
  Project "{{ project_name }}" updated to template v{{ _copier_conf.vcs_ref_hash }}
  Resolve any .rej files or conflict markers, then commit.

_skip_if_exists:
  # Files users typically edit heavily — don't clobber on `copier update`.
  - "src/{{ package_name }}/models/module.py"
  - "src/{{ package_name }}/data/datamodule.py"
  - "configs/experiment/example.yaml"
  - "configs/data/default.yaml"
  - "configs/model/default.yaml"
  - "README.md"

_exclude:
  # Template metadata + files regenerated per-project.
  - "copier.yml"
  - "~*"
  - "*.py[co]"
  - "__pycache__"
  - ".git"
  - ".DS_Store"
  - ".svn"
  - "uv.lock"

_tasks:
  - command: ["git", "init", "-b", "main"]
    when: "{{ _copier_operation == 'copy' }}"
  - ["uv", "lock"]
  - ["uv", "sync", "--extra", "dev"]
  - command: ["uv", "run", "pre-commit", "install"]
    when: "{{ _copier_operation == 'copy' }}"

# ---- Prompts ----

project_name:
  type: str
  help: "Human-readable project name (e.g., 'My ML Project')."
  placeholder: "My ML Project"
  validator: "{% if not project_name %}Project name cannot be empty.{% endif %}"

package_name:
  type: str
  help: "Python package name (import name). Must be a valid Python identifier."
  default: "{{ project_name|lower|replace(' ', '_')|replace('-', '_') }}"
  validator: >-
    {% if not (package_name | regex_search('^[a-z][a-z0-9_]*$')) %}
    package_name must match ^[a-z][a-z0-9_]*$ (lowercase, start with letter, only letters/digits/underscores).
    {% endif %}

project_description:
  type: str
  help: "One-sentence project description (used in pyproject.toml and README)."
  default: "A machine learning research project."

author_name:
  type: str
  help: "Your full name (used in LICENSE and pyproject.toml)."
  placeholder: "Jane Doe"
  validator: "{% if not author_name %}Author name cannot be empty.{% endif %}"

author_email:
  type: str
  help: "Your email (used in pyproject.toml)."
  placeholder: "jane@example.com"
  validator: >-
    {% if not (author_email | regex_search('^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$')) %}
    Please enter a valid email address.
    {% endif %}

python_version:
  type: str
  help: "Python version to pin."
  choices:
    - "3.10"
    - "3.11"
    - "3.12"
  default: "3.11"

cuda_version:
  type: str
  help: "CUDA version for PyTorch on Linux (cpu = CPU-only; on macOS torch uses wheels automatically)."
  choices:
    - "cpu"
    - "cu118"
    - "cu124"
    - "cu126"
    - "cu128"
  default: "cu124"

logger:
  type: str
  help: >-
    Default experiment tracker. wandb = best UI + cloud sharing (needs account);
    aim = best local UI (no account, fully offline); tensorboard = universal but
    basic; csv = zero-dep flat files. All four are always installable — this
    just picks the default for new runs.
  choices:
    - "wandb"
    - "aim"
    - "tensorboard"
    - "csv"
  default: "wandb"

include_example:
  type: bool
  help: "Include the MLP reference example (model, demo, docs, project page, example experiment configs, and smoke tests)?"
  default: true

include_dennys_rules:
  type: bool
  help: "Include DENNYS_RULES.md (Dennis Loevlie's research operating manual)?"
  default: false
